<text x="944" y="392" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="14.5" font-weight="700" fill="#b3261e" text-anchor="start">exit 1 · blockers</text>
<text x="944" y="418" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">resolve every blocker</text>
<text x="944" y="436" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">before the TC votes</text>
