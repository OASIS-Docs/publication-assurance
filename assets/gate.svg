<rect width="1200" height="600" fill="#edf3f9"/><rect x="0.5" y="0.5" width="1199" height="599" fill="none" stroke="#d5dae0" stroke-width="1"/>
<text x="56" y="52" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="500" fill="#0a4a8f" text-anchor="start" letter-spacing="2.2">LAYER 1 · VALIDATION</text>
<text x="56" y="86" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#0a2540" text-anchor="start">pub-check: the publication gate</text>
<text x="56" y="112" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6b7380" text-anchor="start">One stdlib Python file. Every check traces to a real correction round. Authority is derived from the package itself.</text>
<rect x="56" y="210" width="200" height="190" rx="2" ry="2" fill="#fafcfe" stroke="#aeb7c4" stroke-width="1"/>
<text x="74" y="242" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="#0a2540" text-anchor="start" letter-spacing="1.1">WORK PRODUCT</text>
<line x1="74" y1="254" x2="238" y2="254" stroke="#d5dae0" stroke-width="1"/>
<text x="74" y="284" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">spec-vN.N-csdNN.md</text>
<text x="74" y="310" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">        + .html + .pdf</text>
<text x="74" y="336" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">schema/*.json</text>
<text x="74" y="362" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">manifest.json</text>
<line x1="264" y1="305.0" x2="298" y2="305.0" stroke="#0a2540" stroke-width="1.4" marker-end="url(#aInk)"/>
<rect x="306" y="152" width="564" height="356" rx="3" ry="3" fill="#fafcfe" stroke="#aeb7c4" stroke-width="1"/>
<text x="330" y="188" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#0a2540" text-anchor="start">92 checks in 34 classes</text>
<text x="846" y="188" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7380" text-anchor="end">grouped by what they protect</text>
<line x1="330" y1="202" x2="846" y2="202" stroke="#d5dae0" stroke-width="1"/>
<rect x="330" y="218" width="250" height="78" rx="2" ry="2" fill="#f2f6fb" stroke="#d5dae0" stroke-width="1"/>
<text x="344" y="244" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="500" fill="#0a2540" text-anchor="start">Naming &amp; stages</text>
<text x="566" y="244" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="700" fill="#2248e5" text-anchor="end">16</text>
<text x="344" y="264" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#6b7380" text-anchor="start">stage tokens, versions, filenames,</text>
<text x="344" y="280" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#6b7380" text-anchor="start">collisions</text>
<rect x="596" y="218" width="250" height="78" rx="2" ry="2" fill="#f2f6fb" stroke="#d5dae0" stroke-width="1"/>
<text x="610" y="244" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="500" fill="#0a2540" text-anchor="start">Front matter &amp; links</text>
<text x="832" y="244" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="700" fill="#2248e5" text-anchor="end">22</text>
<text x="610" y="264" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#6b7380" text-anchor="start">This/Latest URLs, anchors, dead lists</text>
<rect x="330" y="310" width="250" height="78" rx="2" ry="2" fill="#f2f6fb" stroke="#d5dae0" stroke-width="1"/>
<text x="344" y="336" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="500" fill="#0a2540" text-anchor="start">Content residue</text>
<text x="566" y="336" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="700" fill="#2248e5" text-anchor="end">11</text>
<text x="344" y="356" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#6b7380" text-anchor="start">TODO/tbd, stale headers, working titles</text>
<rect x="596" y="310" width="250" height="78" rx="2" ry="2" fill="#f2f6fb" stroke="#d5dae0" stroke-width="1"/>
<text x="610" y="336" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="500" fill="#0a2540" text-anchor="start">Rendering &amp; sync</text>
<text x="832" y="336" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="700" fill="#2248e5" text-anchor="end">24</text>
<text x="610" y="356" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#6b7380" text-anchor="start">PDF sync, fonts, images, Word fidelity</text>
<rect x="330" y="402" width="250" height="78" rx="2" ry="2" fill="#f2f6fb" stroke="#d5dae0" stroke-width="1"/>
<text x="344" y="428" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="500" fill="#0a2540" text-anchor="start">Template &amp; policy</text>
<text x="566" y="428" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="700" fill="#2248e5" text-anchor="end">9</text>
<text x="344" y="448" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#6b7380" text-anchor="start">sections, Conformance, RFC 2119, logo</text>
<rect x="596" y="402" width="250" height="78" rx="2" ry="2" fill="#f2f6fb" stroke="#d5dae0" stroke-width="1"/>
<text x="610" y="428" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="500" fill="#0a2540" text-anchor="start">Package hygiene</text>
<text x="832" y="428" font-family="'IBM Plex Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="700" fill="#2248e5" text-anchor="end">10</text>
<text x="610" y="448" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#6b7380" text-anchor="start">junk files, symlinks, schema $id, sha256</text>
<text x="330" y="536" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7380" text-anchor="start">Code fences and pre/code content are excluded from prose checks.</text>
<text x="330" y="554" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7380" text-anchor="start">Track-aware: DOCX-native packages skip Markdown-only checks and gain render-fidelity checks.</text>
