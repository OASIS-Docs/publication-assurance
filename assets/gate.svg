<text x="944" y="266" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">no resubmission cycle:</text>
<text x="944" y="284" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">intake verifies and publishes</text>
