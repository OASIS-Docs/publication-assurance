<text x="100" y="834" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">Runs in the TC's own CI before submission.</text>
<text x="100" y="853" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">Re-run identically by TC Administration at intake (step 4b).</text>
<text x="100" y="878" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#313131" text-anchor="start">Every finding gets a severity:</text>
