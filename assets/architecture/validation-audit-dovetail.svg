<text x="56" y="78" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#0a2540" text-anchor="start">How the two layers dovetail</text>
<text x="56" y="102" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#6b7380" text-anchor="start">One validation engine runs on both sides; the publication audit wraps it with the gates only a human or a live check can run.</text>
