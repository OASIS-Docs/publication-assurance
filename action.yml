#
# oasis-pub-check as a drop-in GitHub Action.
#
# A TC adds ONE step to its own CI and the publication gate runs against its
# package. The engine (pub-check/oasis_pub_check.py) and all its data
# (authorities.yaml, rules/) ship with this action, so the TC vendors nothing
# and pins to a version tag to receive fixes.
#
# Minimal usage in a TC repo (.github/workflows/pub-check.yml):
#
#   name: pub-check
#   on: [push, pull_request, workflow_dispatch]
#   jobs:
#     pub-check:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#         - uses: OASIS-Docs/publication-assurance@v1
#           with:
#             target: path/to/stage-dir-or-package.zip
#
# The step fails (red CI) when the gate reports one or more blockers; warnings
# do not fail the build (the gate exits 0 on "publishable").

name: "OASIS pub-check"
description: "Run the OASIS publication acceptance gate (oasis-pub-check) against a TC package or stage directory."
author: "OASIS Open"

branding:
  icon: "check-circle"
  color: "blue"

inputs:
  target:
    description: "Stage directory or package .zip to check, relative to the calling repo's checkout (e.g. work/v1.0/csd01 or dist/mytc-v1.0-csd01.zip)."
    required: true
  args:
    description: "Extra flags passed through to oasis_pub_check.py (e.g. '--json' for machine-readable output, '--emit-manifest')."
    required: false
    default: ""
  python-version:
    description: "Python version to run the gate on."
    required: false
    default: "3.x"
  install-poppler:
    description: "Install poppler-utils (pdftotext/pdffonts) for the optional PDF cross-checks. Set 'false' to skip on runners without apt."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install pdftotext (optional PDF cross-check)
      if: ${{ inputs.install-poppler == 'true' }}
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y poppler-utils

    - name: Run the OASIS publication gate
      shell: bash
      run: |
        python3 "${{ github.action_path }}/pub-check/oasis_pub_check.py" "${{ inputs.target }}" ${{ inputs.args }}
